        <div style={{fontSize:14,color:'var(--muted)',marginBottom:28}}>Thanks, <strong>{account.name}</strong>. Your request has been added to the intake queue. The analytics team will review it shortly.</div>
        <button className="btn btn-primary" style={{justifyContent:'center'}} onClick={()=>{setF(empty);setSubmitted(false);}}>Submit Another Request</button>
      </div>
    </div>
  );

  return (
    <div style={{width:'100%',background:'var(--bg)',minHeight:'100vh'}}>
      <div style={{background:'linear-gradient(135deg,#0d1e2d 0%,#1a3045 100%)',padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
        <GRIDMark size={32}/>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:'#fff',letterSpacing:'.3px'}}>Data Request Portal</div>
          <div style={{fontSize:11,color:'#8ba3b8'}}>The Master Trades Group · Analytics Team</div>
        </div>
        <div style={{marginLeft:'auto',fontSize:11,color:'#4a6070'}}>Signed in as {account.name}</div>
      </div>
      <div style={wrap}>
        <div style={{fontSize:20,fontWeight:800,color:'var(--sidebar)',marginBottom:4}}>Submit a Data Request</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:24}}>Fill out the form below and the analytics team will review your request shortly.</div>

        <div style={secHead}>About Your Request</div>
        <div className="field" style={{marginBottom:14}}>
          <label style={labelStyle}>Request Title {reqStar}</label>
          <input autoFocus value={f.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Q2 Sales Dashboard by Region" style={{width:'100%'}}/>
          {hint('Give your request a short, descriptive name')}
        </div>
        <div className="field-grid" style={{marginBottom:14}}>
          <div className="field"><label style={labelStyle}>Your Name {reqStar}</label><input value={f.requestor} onChange={e=>set('requestor',e.target.value)} placeholder="First and last name"/></div>
          <div className="field"><label style={labelStyle}>Your Team {reqStar}</label>
            <select value={f.team} onChange={e=>set('team',e.target.value)}>
              <option value="">Select a team…</option>
              {teams.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
        </div>

        <div style={secHead}>What You Need</div>
        <div className="field" style={{marginBottom:14}}>
          <label style={labelStyle}>What are you looking for? {reqStar}</label>
          <textarea value={f.description} onChange={e=>set('description',e.target.value)} placeholder="Describe the report, dashboard, or data you need. Be as specific as possible — include filters, time ranges, breakdowns, etc." style={{minHeight:90,resize:'vertical',width:'100%'}}/>
        </div>
        <div className="field" style={{marginBottom:14}}>
          <label style={labelStyle}>Why do you need it? {reqStar}</label>
          <textarea value={f.justification} onChange={e=>set('justification',e.target.value)} placeholder="What business decision or problem does this support?" style={{minHeight:70,resize:'vertical',width:'100%'}}/>
        </div>
        <div className="field" style={{marginBottom:14}}>
          <label style={labelStyle}>What does success look like? <span style={{fontWeight:400,textTransform:'none',letterSpacing:0}}>(optional)</span></label>
          <textarea value={f.success} onChange={e=>set('success',e.target.value)} placeholder="How will you know this is complete?" style={{minHeight:60,resize:'vertical',width:'100%'}}/>
        </div>

        <div style={secHead}>Logistics</div>
        <div className="field" style={{marginBottom:14}}>
          <label style={labelStyle}>Priority {reqStar}</label>
          {PRIORITY_OPTS.map(o=>(
            <label key={o.val} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',marginBottom:4,borderRadius:6,border:`1px solid ${f.priority===o.val?'var(--accent)':'var(--border)'}`,background:f.priority===o.val?'var(--accent-light)':'transparent',cursor:'pointer',fontSize:13}}>
              <input type="radio" name="priority" value={o.val} checked={f.priority===o.val} onChange={()=>set('priority',o.val)} style={{accentColor:'var(--accent)'}}/>
              {o.label}
            </label>
          ))}
        </div>
        <div className="field-grid" style={{marginBottom:14}}>
          <div className="field"><label style={labelStyle}>Target deadline <span style={{fontWeight:400,textTransform:'none',letterSpacing:0}}>(optional)</span></label><input type="date" value={f.deadline} onChange={e=>set('deadline',e.target.value)}/></div>
          <div className="field"><label style={labelStyle}>How often will you use this?</label>
            <select value={f.frequency} onChange={e=>set('frequency',e.target.value)}>{FREQ.map(o=><option key={o} value={o}>{o||'Select one…'}</option>)}</select>
          </div>
        </div>

        <div style={secHead}>Context <span style={{fontWeight:400,color:'var(--muted)',textTransform:'none',letterSpacing:0,fontSize:11}}>(optional — helps us scope faster)</span></div>
        <div className="field" style={{marginBottom:14}}>
          <label style={labelStyle}>Data sources / systems involved</label>
          <input value={f.data_sources} onChange={e=>set('data_sources',e.target.value)} placeholder="e.g. Netsuite, Workday, ServiceTitan, Excel exports…" style={{width:'100%'}}/>
        </div>
        <div className="field" style={{marginBottom:28}}>
          <label style={labelStyle}>Other stakeholders to notify</label>
          <input value={f.stakeholders} onChange={e=>set('stakeholders',e.target.value)} placeholder="Names of anyone else who should be kept in the loop" style={{width:'100%'}}/>
        </div>

        {err && <div style={{fontSize:12,color:'var(--high)',marginBottom:12,padding:'10px 14px',background:'var(--high-bg)',borderRadius:6,border:'1px solid var(--high-border)'}}>{err}</div>}
        {!required && <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>Fields marked <span style={{color:'var(--high)'}}>*</span> are required.</div>}
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px 20px',fontSize:14,opacity:required?1:.5}} onClick={submitForm} disabled={!required||submitting}>
          {submitting ? 'Submitting…' : 'Submit Request →'}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(IS_FORM ? <FormApp/> : <App/>);
</script>
</body>
</html>
